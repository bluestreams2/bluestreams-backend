quarkus.http.cors.enabled=true
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=*
quarkus.http.limits.max-body-size=10G
quarkus.http.host=0.0.0.0

quarkus.datasource.db-kind=postgresql

quarkus.datasource.username=myflix
quarkus.datasource.password=myflix

quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/myflix

quarkus.hibernate-orm.database.generation=update

quarkus.hibernate-orm.schema-management.strategy=drop-and-create

quarkus.datasource.jdbc.max-size=3
quarkus.datasource.jdbc.min-size=1
quarkus.hibernate-orm.jdbc.statement-batch-size=0

quarkus.datasource.jdbc.additional-jdbc-properties.busy_timeout=5000
quarkus.datasource.jdbc.additional-jdbc-properties.journal_mode=WAL
quarkus.transaction-manager.default-transaction-timeout=300
mp.jwt.verify.issuer=myflix

smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.publickey.location=publicKey.pem


